<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Coder social preview">
  <defs>
    <linearGradient id="sg" x1="0" x2="1">
      <stop offset="0" stop-color="#0ea5e9" />
      <stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
    <filter id="f" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20" result="b" />
      <feBlend in="SourceGraphic" in2="b" mode="screen" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#071029" />
  <g transform="translate(60,60)" filter="url(#f)">
    <rect x="0" y="0" width="1080" height="510" rx="28" fill="url(#sg)" opacity="0.08" />
  </g>

  <g transform="translate(120,165)">
    <rect width="160" height="160" rx="20" fill="#071029" stroke="#38bdf8" stroke-width="4" />
    <g transform="translate(30,48)" fill="none" stroke="#38bdf8" stroke-width="8" stroke-linecap="round">
      <polyline points="0,36 36,0 72,36" />
      <polyline points="112,0 148,36 112,72" />
    </g>
  </g>

  <text x="320" y="230" font-family="Inter,Segoe UI,Arial" font-size="72" fill="#e6f2ff">Coder</text>
  <text x="320" y="295" font-family="Inter,Segoe UI,Arial" font-size="28" fill="#9fbfdc">AI code analysis · fix · improve</text>
</svg>
