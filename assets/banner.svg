<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Coder banner">
  <defs>
    <linearGradient id="grad" x1="0" x2="1">
      <stop offset="0" stop-color="#7c3aed" />
      <stop offset="1" stop-color="#06b6d4" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="#071029" />
  <rect x="40" y="40" width="1120" height="550" rx="30" fill="#071029" stroke="url(#grad)" stroke-opacity="0.12" stroke-width="6" />

  <g transform="translate(80,110)">
    <rect width="200" height="200" rx="24" fill="#071029" stroke="#38bdf8" stroke-width="4" />
    <g transform="translate(36,66)" fill="none" stroke="#38bdf8" stroke-width="8" stroke-linecap="round">
      <polyline points="0,36 36,0 72,36" />
      <polyline points="152,0 188,36 152,72" />
    </g>
  </g>

  <text x="360" y="220" font-family="Inter,Segoe UI,Arial" font-size="72" fill="#e6f2ff">Coder</text>
  <text x="360" y="280" font-family="Inter,Segoe UI,Arial" font-size="24" fill="#9fbfdc">AI-powered code analysis · fix · improve</text>

  <g transform="translate(360,340)" fill="#9fbfdc" font-family="Inter,Segoe UI,Arial" font-size="18">
    <text x="0" y="0">• Python analyzer (AST)</text>
    <text x="0" y="30">• JavaScript (eslint) and C++ (cppcheck) integrations</text>
    <text x="0" y="60">• Interactive mode, code fixing and generation helpers</text>
  </g>
</svg>
