name: Generate PNGs from SVGs

on:
  push:
    branches: [ feat/logo ]

jobs:
  generate-pngs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install rsvg-convert
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin git

      - name: Convert logo to PNG (256x256)
        run: |
          mkdir -p assets/png
          if [ -f assets/logo.svg ]; then
            rsvg-convert -w 256 -h 256 assets/logo.svg -o assets/png/logo-256.png || true
          fi

      - name: Convert banner to PNG (800x200)
        run: |
          if [ -f assets/banner.svg ]; then
            rsvg-convert -w 800 -h 200 assets/banner.svg -o assets/png/banner-800x200.png || true
          fi

      - name: Convert social preview to PNG (1200x630)
        run: |
          if [ -f assets/social_preview.svg ]; then
            rsvg-convert -w 1200 -h 630 assets/social_preview.svg -o assets/png/social-1200x630.png || true
          fi

      - name: Commit and push PNGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/png || true
          git commit -m "chore(assets): add generated PNGs from SVGs" || echo "no changes to commit"
          git push origin HEAD:feat/logo || true
